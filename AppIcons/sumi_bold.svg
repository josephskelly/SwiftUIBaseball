<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <title>Sumi Baseball — Bold</title>
  <defs>
    <filter id="heavyink" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="5" seed="9" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="11"
          xChannelSelector="R" yChannelSelector="G" result="rough"/>
      <feGaussianBlur in="rough" stdDeviation="2" result="blurred"/>
      <feComposite in="blurred" in2="SourceGraphic" operator="atop"/>
    </filter>
    <filter id="paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4"
          stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply"/>
    </filter>
    <radialGradient id="ballGrad" cx="38%" cy="33%" r="65%">
      <stop offset="0%" stop-color="#FEFEFB"/>
      <stop offset="100%" stop-color="#EAE4D4"/>
    </radialGradient>
  </defs>
  <!-- White rice paper background -->
  <rect width="1024" height="1024" fill="#FAFAF5"/>
  <rect width="1024" height="1024" fill="#FAFAF5" filter="url(#paper)" opacity="0.3"/>

  <!-- Ball fill — soft gradient -->
  <circle cx="512" cy="512" r="440" fill="url(#ballGrad)"/>

  <!-- Heavy brushstroke circle outline -->
  <circle cx="512" cy="512" r="440" fill="none" stroke="#100B06"
          stroke-width="54" filter="url(#heavyink)"/>

  <!-- Inner depth ring -->
  <circle cx="512" cy="512" r="424" fill="none" stroke="#1A120A"
          stroke-width="6" opacity="0.12"/>

  <!-- Bold red seams -->
  <path d="M 460,78 C 308,218 295,392 445,512 C 588,632 572,802 460,946" fill="none" stroke="#CC1500" stroke-width="18"
        stroke-linecap="round" filter="url(#heavyink)"/>
  <path d="M 564,78 C 716,218 729,392 579,512 C 436,632 452,802 564,946" fill="none" stroke="#CC1500" stroke-width="18"
        stroke-linecap="round" filter="url(#heavyink)"/>

  <!-- Bold stitch ticks -->
  <line x1="374.6" y1="136.0" x2="401.4" y2="160.0" stroke="#CC1500" stroke-width="13" stroke-linecap="round"/>
  <line x1="319.5" y1="250.2" x2="324.5" y2="285.8" stroke="#CC1500" stroke-width="13" stroke-linecap="round"/>
  <line x1="304.3" y1="411.6" x2="311.7" y2="376.4" stroke="#CC1500" stroke-width="13" stroke-linecap="round"/>
  <line x1="399.0" y1="477.6" x2="417.0" y2="446.4" stroke="#CC1500" stroke-width="13" stroke-linecap="round"/>
  <line x1="473.5" y1="546.1" x2="490.5" y2="577.9" stroke="#CC1500" stroke-width="13" stroke-linecap="round"/>
  <line x1="566.3" y1="658.4" x2="573.7" y2="693.6" stroke="#CC1500" stroke-width="13" stroke-linecap="round"/>
  <line x1="552.4" y1="817.1" x2="563.6" y2="782.9" stroke="#CC1500" stroke-width="13" stroke-linecap="round"/>
  <line x1="479.7" y1="898.7" x2="500.3" y2="869.3" stroke="#CC1500" stroke-width="13" stroke-linecap="round"/>
  <line x1="622.6" y1="160.0" x2="649.4" y2="136.0" stroke="#CC1500" stroke-width="13" stroke-linecap="round"/>
  <line x1="699.5" y1="285.8" x2="704.5" y2="250.2" stroke="#CC1500" stroke-width="13" stroke-linecap="round"/>
  <line x1="712.3" y1="376.4" x2="719.7" y2="411.6" stroke="#CC1500" stroke-width="13" stroke-linecap="round"/>
  <line x1="607.0" y1="446.4" x2="625.0" y2="477.6" stroke="#CC1500" stroke-width="13" stroke-linecap="round"/>
  <line x1="533.5" y1="577.9" x2="550.5" y2="546.1" stroke="#CC1500" stroke-width="13" stroke-linecap="round"/>
  <line x1="450.3" y1="693.6" x2="457.7" y2="658.4" stroke="#CC1500" stroke-width="13" stroke-linecap="round"/>
  <line x1="460.4" y1="782.9" x2="471.6" y2="817.1" stroke="#CC1500" stroke-width="13" stroke-linecap="round"/>
  <line x1="523.7" y1="869.3" x2="544.3" y2="898.7" stroke="#CC1500" stroke-width="13" stroke-linecap="round"/>
</svg>